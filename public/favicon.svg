<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#272d37"/>
      <stop offset="1" stop-color="#121419"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e83a40"/>
      <stop offset="0.5" stop-color="#d71920"/>
      <stop offset="1" stop-color="#a91218"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4d5966"/>
      <stop offset="1" stop-color="#1b2128"/>
    </linearGradient>
    <clipPath id="bodyClip">
      <rect x="13" y="7" width="38" height="46" rx="8"/>
    </clipPath>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- double-decker front -->
  <rect x="13" y="7" width="38" height="46" rx="8" fill="url(#body)"/>
  <g clip-path="url(#bodyClip)">
    <!-- destination display -->
    <rect x="17" y="10" width="30" height="7" rx="2" fill="#15181d"/>
    <rect x="19.5" y="12" width="12" height="3" rx="1.5" fill="#ffb400"/>
    <!-- upper deck window -->
    <rect x="17" y="19.5" width="30" height="10" rx="3.5" fill="url(#glass)"/>
    <rect x="18.8" y="20.8" width="26.4" height="2.6" rx="1.3" fill="rgba(255,255,255,0.26)"/>
    <!-- lower deck windscreen -->
    <rect x="17" y="32.5" width="30" height="11.5" rx="3.5" fill="url(#glass)"/>
    <rect x="18.8" y="33.8" width="26.4" height="2.8" rx="1.4" fill="rgba(255,255,255,0.22)"/>
    <!-- bumper -->
    <rect x="13" y="47.5" width="38" height="5.5" fill="#5b6470"/>
  </g>
  <rect x="13.6" y="7.6" width="36.8" height="44.8" rx="7.4" fill="none" stroke="rgba(15,19,25,0.45)" stroke-width="1.2"/>

  <!-- headlights -->
  <circle cx="20.5" cy="46" r="2.6" fill="#ffedb0" stroke="rgba(15,19,25,0.4)" stroke-width="0.9"/>
  <circle cx="43.5" cy="46" r="2.6" fill="#ffedb0" stroke="rgba(15,19,25,0.4)" stroke-width="0.9"/>

  <!-- wheels -->
  <rect x="19" y="53" width="7" height="7" rx="3.5" fill="#3c434e"/>
  <rect x="38" y="53" width="7" height="7" rx="3.5" fill="#3c434e"/>
</svg>
